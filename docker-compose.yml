services:
  # LocalStack: CloudWatch Logs / EventBridge のローカルエミュレーション
  localstack:
    image: localstack/localstack:4
    ports:
      - "4567:4566"
    environment:
      - SERVICES=logs,events,iam
      - DEBUG=0
      - PERSISTENCE=1
      - AWS_DEFAULT_REGION=ap-northeast-1
    volumes:
      - ./data/localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO: S3 互換オブジェクトストレージ
  minio:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # LocalStack / MinIO の初期化（Log Groups とバケット作成）
  init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/init.sh"]
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-northeast-1
    volumes:
      - ./scripts:/scripts

  collector:
    build:
      context: .
      dockerfile: cmd/collector/Dockerfile
    ports:
      - "4318:4318"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - STORAGE=${STORAGE:-file}
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-northeast-1
    depends_on:
      - localstack

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - STORAGE=${STORAGE:-file}
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-northeast-1

  # Phase 3 で実装予定
  processor:
    profiles: ["full"]
    build:
      context: .
      dockerfile: cmd/processor/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin

  dashboard:
    profiles: ["full"]
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    depends_on:
      - api
