services:
  # LocalStack: CloudWatch Logs / EventBridge のローカルエミュレーション
  localstack:
    image: localstack/localstack:4
    ports:
      - "4567:4566"
    environment:
      - SERVICES=logs,events,iam
      - DEBUG=0
      - PERSISTENCE=1
      - AWS_DEFAULT_REGION=ap-northeast-1
    volumes:
      - ./data/localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # LocalStack の初期化（Log Groups 作成）
  init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/init.sh"]
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-northeast-1
    volumes:
      - ./scripts:/scripts

  collector:
    build:
      context: .
      dockerfile: cmd/collector/Dockerfile
    ports:
      - "4318:4318"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - STORAGE=${STORAGE:-file}
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=ap-northeast-1
    depends_on:
      - localstack

  # Phase 3 で実装予定
  processor:
    profiles: ["full"]
    build:
      context: .
      dockerfile: cmd/processor/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data

  dashboard:
    profiles: ["full"]
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
